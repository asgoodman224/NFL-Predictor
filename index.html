<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Game Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main header section with the site title -->
    <header>
        <h1>NFL Game Predictor</h1>
    </header>
    <!-- Navigation bar -->
    <nav>
        <ul>
            <li><a href="#" id="homeLink" class="active">Home</a></li>
            <li><a href="#" id="customGameLink">Custom Game</a></li>
        </ul>
    </nav>

    <main>
        <!-- Controls for selecting games -->
        <div class="controls">
            <label for="weekSelect">Select Week:</label>
            <select id="weekSelect">
                <option value="current">Current Week</option>
                <optgroup label="Regular Season">
                    <option value="1">Week 1</option>
                    <option value="2">Week 2</option>
                    <option value="3">Week 3</option>
                    <option value="4">Week 4</option>
                    <option value="5">Week 5</option>
                    <option value="6">Week 6</option>
                    <option value="7">Week 7</option>
                    <option value="8">Week 8</option>
                    <option value="9">Week 9</option>
                    <option value="10">Week 10</option>
                    <option value="11">Week 11</option>
                    <option value="12">Week 12</option>
                    <option value="13">Week 13</option>
                    <option value="14">Week 14</option>
                    <option value="15">Week 15</option>
                    <option value="16">Week 16</option>
                    <option value="17">Week 17</option>
                    <option value="18">Week 18</option>
                </optgroup>
                <optgroup label="Playoffs">
                    <option value="19">Wild Card</option>
                    <option value="20">Divisional</option>
                    <option value="21">Conference Championships</option>
                    <option value="22">Super Bowl</option>
                </optgroup>
                <option value="full">Full Season</option>
            </select>
            <button id="loadGamesBtn">Load Games</button>
        </div>

        <!-- Container where all the game predictions will show up -->
        <div id="gamesContainer">
            <!-- Game cards will be loaded here when you click the button -->
        </div>

        <!-- Custom Game Predictor Section (hidden by default) -->
        <div id="customGameContainer">
            <h2 class="custom-game-title">Custom Historical Matchup</h2>
            <p class="custom-game-subtitle">Pick any NFL team from any year (1970-present) against another!</p>
            
            <div class="custom-game-panels">
                <!-- Home Team Panel -->
                <div class="team-panel home-panel">
                    <h3>Home Team</h3>
                    <div class="team-selector">
                        <label for="homeYearSelect">Season Year:</label>
                        <select id="homeYearSelect" class="year-select">
                            <!-- Years will be populated by JS -->
                        </select>
                    </div>
                    <div class="team-selector">
                        <label for="homeTeamSelect">Team:</label>
                        <select id="homeTeamSelect" class="team-select">
                            <option value="">Select a team...</option>
                        </select>
                    </div>
                    <div id="homeTeamPreview" class="team-preview">
                        <!-- Team stats preview will appear here -->
                    </div>
                </div>

                <!-- VS Divider -->
                <div class="vs-divider">
                    <span>VS</span>
                </div>

                <!-- Away Team Panel -->
                <div class="team-panel away-panel">
                    <h3>Away Team</h3>
                    <div class="team-selector">
                        <label for="awayYearSelect">Season Year:</label>
                        <select id="awayYearSelect" class="year-select">
                            <!-- Years will be populated by JS -->
                        </select>
                    </div>
                    <div class="team-selector">
                        <label for="awayTeamSelect">Team:</label>
                        <select id="awayTeamSelect" class="team-select">
                            <option value="">Select a team...</option>
                        </select>
                    </div>
                    <div id="awayTeamPreview" class="team-preview">
                        <!-- Team stats preview will appear here -->
                    </div>
                </div>
            </div>

            <!-- Predict Button -->
            <div class="predict-button-container">
                <button id="predictCustomBtn" class="predict-btn">Predict Game</button>
            </div>

            <!-- Results Container -->
            <div id="customResultContainer">
                <!-- Prediction results will appear here -->
            </div>
        </div>
    </main>

    <!-- Footer with copyright info and disclaimer -->
    <footer>
        <p>&copy; 2026 NFL Game Predictor</p>
        <p>Predictions are for entertainment purposes only</p>
    </footer>

    <!-- Link to the JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
